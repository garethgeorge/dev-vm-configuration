# NixOS devbox (Linux NAS: dontpanic) — powered by nixos-lima v0.0.4
#
# ─── ⚠  SSH / MOUNT SAFETY — READ BEFORE EDITING ──────────────────────────
# On a Linux host, 9p/virtiofs mounts shadow anything already at the guest
# mountPoint.  If the guest mountPoint overlaps with a directory that lima /
# NixOS writes SSH keys into, the VM boots but is UNREACHABLE and from the
# outside looks unbootable.  Paths that MUST NOT be used (or overlapped) as
# a guest mountPoint:
#
#   /                    — shadows everything
#   /root  /root/.ssh    — root's authorized_keys that lima uses
#   /home                — every guest user's home, including the lima user
#   /home/<lima-user>    — the lima user's authorized_keys
#   /etc   /etc/ssh      — sshd host keys
#
# Safe guest mountPoints (used below) live under /mnt/<name> or /flake, which
# nothing inside the VM ever writes SSH material into.  When adding mounts,
# keep them under /mnt/... unless you really know what you are doing.
#
# The host-side `location:` may be anything on the NAS — collisions there
# are harmless, only the guest-side mountPoint matters for this class of
# bug.
# ──────────────────────────────────────────────────────────────────────────
#
# ── Portable config ────────────────────────────────────────────────────────
# Set flakeHostPath to the absolute path of this repo on the NAS.
# It will always be mounted at /flake inside the VM.
#
# nasDataHostPath is the NAS directory you want visible inside the VM. It
# lands at /mnt/dontpanic — deliberately NOT /home, /root, /etc, or any
# parent of those, so guest SSH keys cannot be shadowed.
#
param:
  flakeHostPath: "~/devboxes/nixos-devbox"
  nasDataHostPath: "~"
# ──────────────────────────────────────────────────────────────────────────
#
# Start:   limactl start nixos-devbox/nixos-dontpanic.yaml --name devbox
# Shell:   limactl shell devbox
#
# Track first-boot setup:
#   limactl shell devbox -- journalctl -fu devbox-init
#
# Rebuild after editing configuration.nix / flake.nix on the NAS:
#   limactl shell devbox -- sudo nixos-rebuild switch --flake /flake

images:
  - location: "https://github.com/nixos-lima/nixos-lima/releases/download/v0.0.4/nixos-lima-v0.0.4-aarch64.qcow2"
    arch: "aarch64"
    digest: "sha512:a274d225c41918da7f1bb0bc1fde8cc713ed0d36954c21cc26ae403d47879a00f4c3d5601c67c647df87f6f321e1b694140b671910b15a011872311b960569b2"
  - location: "https://github.com/nixos-lima/nixos-lima/releases/download/v0.0.4/nixos-lima-v0.0.4-x86_64.qcow2"
    arch: "x86_64"
    digest: "sha512:5daac286d415a579ca659a98de864fe04ab7a1879d4e4608e3edcd2e931f1848f88ed07316e69a1131ab35b88158b999a21cc5ccf9be9c3d04f51a7e58dc8580"

memory: 16GiB
cpus: 6
disk: 120GiB

# ── Mounts ────────────────────────────────────────────────────────────────
# Guest mountPoints below are all under /mnt/... or /flake — never under
# /home, /root, or /etc.  See the SSH/MOUNT SAFETY block at the top of the
# file before adding new entries.
mounts:
  - location: "{{.Param.flakeHostPath}}"
    mountPoint: "/flake"
    writable: true
    9p:
      cache: "mmap"
  - location: "{{.Param.nasDataHostPath}}"
    mountPoint: "/mnt/dontpanic"
    writable: true
    9p:
      cache: "mmap"
  - location: "/tmp/lima"
    writable: true
    9p:
      cache: "mmap"

# Explicitly disable lima's "mount host home at the same path in guest"
# default — on a Linux host that path can collide with the lima user's
# home and clobber its authorized_keys.  We mount the NAS data at
# /mnt/dontpanic above instead.
mountType: "9p"
mountInotify: false

portForwards:
  - proto: udp
    guestPort: 68
    guestIP: 0.0.0.0
    ignore: true
  # Common dev ports
  - guestPort: 3000    # Node.js, Next.js, React
  - guestPort: 4200    # Angular
  - guestPort: 5000    # Flask, general
  - guestPort: 5173    # Vite
  - guestPort: 8000    # Django, Python HTTP
  - guestPort: 8080    # General HTTP dev
  - guestPort: 8888    # Jupyter
  - guestPort: 9090    # Prometheus, general

containerd:
  system: false
  user: false

provision:
  # lima-init runs this script before 9p mounts are active and while /etc is
  # read-only (NixOS manages it).  Strategy:
  #   • Write the one-shot init script to /var/lib (writable ext4)
  #   • Write the unit to /run/systemd/system (tmpfs — always writable)
  #   • systemctl daemon-reload + start — fires after boot, when mount is live
  - mode: system
    script: |
      #!/bin/bash
      set -euo pipefail

      # ── init script (persisted on ext4) ───────────────────────────────────
      mkdir -p /var/lib/devbox
      cat > /tmp/_devbox_init.sh << 'SCRIPTEOF'
      #!/bin/bash
      set -euo pipefail
      FLAKE_SRC="/flake"
      FLAKE_DIR="/etc/nixos/devbox"
      DONE_FLAG="$FLAKE_DIR/.initialized"

      [ -f "$DONE_FLAG" ] && { echo "devbox-init: already done"; exit 0; }

      # Pick up fstab entries added by lima-init, then mount them
      systemctl daemon-reload || true
      mount -a 2>/dev/null || true

      echo "==> Waiting for NAS mount at $FLAKE_SRC ..."
      i=0
      while [ $i -lt 90 ]; do
        [ -f "$FLAKE_SRC/flake.nix" ] && break
        sleep 2
        i=$((i + 1))
      done

      if [ ! -f "$FLAKE_SRC/flake.nix" ]; then
        echo "ERROR: $FLAKE_SRC/flake.nix not found after 3 min. Is the NAS mount (flakeHostPath) correct?"
        exit 1
      fi

      echo "==> Copying NixOS flake ..."
      mkdir -p "$FLAKE_DIR/modules"
      cp "$FLAKE_SRC/flake.nix"         "$FLAKE_DIR/"
      cp "$FLAKE_SRC/configuration.nix" "$FLAKE_DIR/"
      cp "$FLAKE_SRC/modules/"*.nix     "$FLAKE_DIR/modules/"

      echo "==> nixos-rebuild switch (may take several minutes) ..."
      nixos-rebuild switch --flake "$FLAKE_DIR"

      touch "$DONE_FLAG"
      echo "==> devbox-init complete!"
      SCRIPTEOF
      sed 's/^      //' /tmp/_devbox_init.sh > /var/lib/devbox/init.sh
      chmod +x /var/lib/devbox/init.sh

      # ── systemd unit (tmpfs — survives just this boot) ────────────────────
      mkdir -p /run/systemd/system
      cat > /tmp/_devbox_init.service << 'UNITEOF'
      [Unit]
      Description=Apply devbox NixOS flake from NAS mount
      After=local-fs.target network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      TimeoutStartSec=900
      Environment=PATH=/run/current-system/sw/bin:/run/current-system/sw/sbin:/usr/bin:/bin
      ExecStart=/var/lib/devbox/init.sh
      StandardOutput=journal+console
      StandardError=journal+console
      UNITEOF
      sed 's/^      //' /tmp/_devbox_init.service \
        > /run/systemd/system/devbox-init.service

      systemctl daemon-reload
      # --no-block: don't wait for devbox-init to complete inside lima-init.
      # devbox-init has its own wait loop for the 9p mount.
      systemctl start --no-block devbox-init.service
